---
applications:
  - name: bpsync-backend
    path: .
    buildpacks:
      - python_buildpack
    stack: cflinuxfs4
    memory: 256M
    disk_quota: 512M
    instances: 1
    health-check-type: http
    health-check-http-endpoint: /health
    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "${DATABASE_URL}"
      N8N_URL: "https://bpsync-n8n.cfapps.us10-001.hana.ondemand.com"
      AGENT_URL: "https://bupa-sync-agent.cfapps.us10-001.hana.ondemand.com"
      MOCK_S4_URL: "https://mock-s4hana.cfapps.us10-001.hana.ondemand.com"
      ALLOWED_ORIGINS: "https://bpsync-dashboard.cfapps.us10-001.hana.ondemand.com"
